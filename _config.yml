title: CTOConnect
description: CTO-Level Guidance Without the Full-Time Commitment. Real problems. Real answers. No bullshit.
url: "https://ctoconnect.io"
baseurl: ""

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Bunny.net Stream (video hosting)
# bunny_library_id: "YOUR_LIBRARY_ID"  # Set this when episodes are added

# Collections
collections:
  episodes:
    output: true
    permalink: /episodes/:title/
  posts:
    output: true
    permalink: /articles/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "episodes"
    values:
      layout: "episode"
      members_only: true
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"
      members_only: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Social media
social:
  name: CTO Connect

# Author information
author:
  name: Kyle Miller
  email: kyle@ctoconnect.io
  bio: "24 years building production systems. Built and sold a SaaS. Teaching sustainable development practices to technical founders."
  location: "United States"
