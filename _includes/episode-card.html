<div class="col-md-4 mb-4">
    <div class="card shadow-sm rounded-3 border-0 h-100">
        <div class="card-body p-4">
            <span class="badge bg-purple mb-2">Episode {{ include.episode.episode_number }}</span>
            <h3 class="fs-5 fw-bold mb-2">
                <a href="{{ include.episode.url | relative_url }}" class="text-decoration-none text-dark">
                    {{ include.episode.title }}
                </a>
            </h3>
            <p class="text-muted small mb-2">
                <i class="fas fa-calendar me-1"></i>{{ include.episode.date | date: "%B %-d, %Y" }}
                <span class="mx-1">|</span>
                <i class="fas fa-clock me-1"></i>{{ include.episode.duration }}
            </p>
            <p class="text-muted mb-0">{{ include.episode.description | truncate: 120 }}</p>
        </div>
    </div>
</div>
