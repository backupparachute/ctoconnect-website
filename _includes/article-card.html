<div class="col-md-6 mb-4">
    <div class="card shadow-sm rounded-3 border-0 h-100">
        <div class="card-body p-4">
            {% if include.article.members_only %}
                <span class="badge bg-purple mb-2"><i class="fas fa-lock me-1"></i>Members Only</span>
            {% endif %}
            <h3 class="fs-5 fw-bold mb-2">
                <a href="{{ include.article.url | relative_url }}" class="text-decoration-none text-dark">
                    {{ include.article.title }}
                </a>
            </h3>
            <p class="text-muted small mb-2">
                <i class="fas fa-calendar me-1"></i>{{ include.article.date | date: "%B %-d, %Y" }}
            </p>
            <p class="text-muted mb-0">{{ include.article.teaser | default: include.article.description | truncate: 160 }}</p>
        </div>
    </div>
</div>
