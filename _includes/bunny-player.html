<div class="bunny-player-wrapper mb-4" style="position: relative; padding-top: 56.25%;">
    <iframe
        src="https://iframe.mediadelivery.net/embed/{{ site.bunny_library_id }}/{{ include.video_id }}?autoplay=false&preload=true"
        loading="lazy"
        style="border: 0; position: absolute; top: 0; height: 100%; width: 100%;"

        allowfullscreen="true">

</div>
